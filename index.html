<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganador Elite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash-container">
        <div class="curtain left-curtain"></div>
        <div class="curtain right-curtain"></div>
        <div class="splash-content">
            <img src="splash.png" alt="Ganador Elite" id="splash-img">
        </div>
    </div>

    <main id="app-content" class="hidden">
        <div class="login-card">
            <header>
                <img src="logo.png" alt="Italian G" class="main-logo">
                <h1 class="brand-name">GANADOR</h1>
                <h2 class="welcome-text">WELCOME</h2>
            </header>

            <form id="login-form">
                <div id="form-placeholders"></div>
                <button type="submit" class="btn-gold">SIGN IN</button>
            </form>

            <div class="social-login">
                </div>
        </div>
    </main>

   <script type="module" src="app.js"></script>
</body>
</html>
